<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Pilot</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f5f2eb;
  --surface:   #ffffff;
  --ink:       #1a1a18;
  --muted:     #9a9688;
  --border:    #e2ddd4;
  --accent:    #e8440a;
  --accent2:   #f5a623;
  --green:     #2d7a4f;
  --red:       #c0392b;
  --shadow:    0 2px 0 #1a1a18;
  --shadow-lg: 0 4px 0 #1a1a18;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  padding: 48px 24px 80px;
}

/* ── HEADER ── */
header {
  max-width: 720px;
  margin: 0 auto 40px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 20px;
}

.logo { display: flex; flex-direction: column; line-height: 1; }

.logo-main {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  letter-spacing: .03em;
  color: var(--ink);
  line-height: .9;
}

.logo-tag {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-top: 6px;
}

.count-badge { text-align: right; }

.count-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  color: var(--ink);
  line-height: 1;
}

.count-lbl {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  display: block;
  margin-top: 2px;
}

/* ── ADD BUTTON ── */
.btn-add {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 28px;
  background: var(--accent);
  color: #fff;
  border: 2px solid var(--ink);
  border-radius: 2px;
  box-shadow: var(--shadow-lg);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: .04em;
  cursor: pointer;
  transition: transform .1s, box-shadow .1s;
  max-width: 720px;
  margin: 0 auto 32px;
  width: 100%;
  justify-content: center;
}

.btn-add:hover  { filter: brightness(1.08); }
.btn-add:active { transform: translateY(2px); box-shadow: 0 0 0 var(--ink); }

/* ── FILTERS ── */
.filters {
  max-width: 720px;
  margin: 0 auto 20px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 6px 16px;
  border: 1.5px solid var(--border);
  background: transparent;
  border-radius: 30px;
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
}

.filter-btn:hover         { border-color: var(--ink); color: var(--ink); background: var(--surface); }
.filter-btn.active        { border-color: var(--ink); color: var(--ink); background: var(--surface); font-weight: 600; }

/* ── TASK LIST ── */
.list-wrap {
  max-width: 720px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── TASK CARD ── */
.task-card {
  background: var(--surface);
  border: 2px solid var(--ink);
  border-radius: 3px;
  box-shadow: var(--shadow);
  padding: 16px 20px;
  display: grid;
  grid-template-columns: 28px 1fr auto;
  gap: 14px;
  align-items: start;
  animation: slideIn .25s cubic-bezier(.22,1,.36,1);
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.task-card.done { opacity: .55; background: #f9f7f3; }

/* checkbox */
.task-check {
  width: 22px; height: 22px;
  border: 2px solid var(--ink);
  border-radius: 2px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
  transition: background .15s;
}

.task-check:hover       { background: var(--bg); }
.task-check.checked     { background: var(--green); border-color: var(--green); }
.task-check svg         { display: none; }
.task-check.checked svg { display: block; }

/* body */
.task-name {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 5px;
}

.task-card.done .task-name { text-decoration: line-through; color: var(--muted); }

.task-desc {
  font-size: 13px;
  color: var(--muted);
  margin-top: 2px;
  margin-bottom: 6px;
}

/* deadline tags */
.task-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }

.tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 30px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--muted);
}

.tag.overdue { background: #fff0ed; border-color: var(--accent); color: var(--accent); }
.tag.soon    { background: #fff8e6; border-color: var(--accent2); color: #b87a00; }
.tag.expiry  { opacity: .7; }

/* actions */
.btn-icon {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid var(--border);
  background: transparent; border-radius: 2px;
  cursor: pointer; color: var(--muted);
  transition: border-color .15s, color .15s, background .15s;
  flex-shrink: 0;
}

.btn-icon:hover { border-color: var(--red); color: var(--red); background: #fff5f5; }

/* ── EMPTY ── */
.empty {
  max-width: 720px;
  margin: 40px auto 0;
  text-align: center;
  padding: 60px 20px;
  border: 2px dashed var(--border);
  border-radius: 4px;
  display: none;
}

.empty-icon { font-size: 48px; margin-bottom: 12px; }

.empty h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: .05em; color: var(--muted);
}

.empty p { font-size: 13px; color: var(--muted); margin-top: 6px; }

/* ── OVERLAY ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(26,26,24,.55);
  backdrop-filter: blur(3px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px; z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}

.overlay.open { opacity: 1; pointer-events: all; }

/* ── MODAL ── */
.modal {
  background: var(--surface);
  border: 2px solid var(--ink);
  border-radius: 3px;
  box-shadow: 6px 6px 0 var(--ink);
  width: 100%; max-width: 480px;
  transform: translateY(20px) scale(.97);
  transition: transform .25s cubic-bezier(.22,1,.36,1);
}

.overlay.open .modal { transform: translateY(0) scale(1); }

.modal-header {
  padding: 22px 24px 18px;
  border-bottom: 2px solid var(--ink);
  display: flex; align-items: center; justify-content: space-between;
}

.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px; letter-spacing: .04em;
}

.modal-close {
  width: 34px; height: 34px;
  border: 2px solid var(--ink); background: transparent;
  border-radius: 2px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: background .15s;
}

.modal-close:hover { background: var(--bg); }

.modal-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; }

.field label {
  display: block; font-size: 11px; font-weight: 600;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px;
}

.field input, .field textarea {
  width: 100%; padding: 12px 14px;
  border: 2px solid var(--border); border-radius: 2px;
  font-family: 'Outfit', sans-serif; font-size: 15px;
  background: var(--bg); color: var(--ink);
  outline: none; transition: border-color .15s; resize: none;
}

.field input:focus, .field textarea:focus { border-color: var(--ink); }

.modal-footer {
  padding: 16px 24px 24px;
  display: flex; gap: 10px; justify-content: flex-end;
}

.btn-cancel {
  padding: 12px 22px; border: 2px solid var(--border);
  background: transparent; border-radius: 2px;
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; color: var(--muted); transition: border-color .15s, color .15s;
}

.btn-cancel:hover { border-color: var(--ink); color: var(--ink); }

.btn-submit {
  padding: 12px 28px; background: var(--accent); color: #fff;
  border: 2px solid var(--ink); border-radius: 2px;
  box-shadow: var(--shadow);
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: transform .1s, box-shadow .1s;
}

.btn-submit:hover  { filter: brightness(1.08); }
.btn-submit:active { transform: translateY(2px); box-shadow: none; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-main">Task Pilot</div>
    <div class="logo-tag">✈ Navigate your day</div>
  </div>
  <div class="count-badge">
    <div class="count-num" id="countDisplay">0</div>
    <span class="count-lbl">zadań</span>
  </div>
</header>

<button class="btn-add" onclick="openModal()">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
  </svg>
  Dodaj nowe zadanie
</button>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">Wszystkie</button>
  <button class="filter-btn"        onclick="setFilter('active',this)">Aktywne</button>
  <button class="filter-btn"        onclick="setFilter('done',this)">Ukończone</button>
  <button class="filter-btn"        onclick="setFilter('overdue',this)">Przeterminowane</button>
</div>

<div class="list-wrap" id="taskList"></div>
<div class="empty" id="emptyState">
  <div class="empty-icon">✈️</div>
  <h3>Brak zadań na liście</h3>
  <p>Kliknij „Dodaj nowe zadanie" i zacznij misję.</p>
</div>

<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Nowe zadanie</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Nazwa zadania</label>
        <input type="text" id="taskName" placeholder="Co trzeba zrobić?" maxlength="120" autocomplete="off">
      </div>
      <div class="field">
        <label>Opis <span style="font-weight:400;letter-spacing:0;text-transform:none;color:var(--muted)">(opcjonalnie)</span></label>
        <textarea id="taskDesc" rows="2" placeholder="Dodatkowe szczegóły…"></textarea>
      </div>
      <div class="field">
        <label>Deadline</label>
        <input type="date" id="taskDeadline">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Anuluj</button>
      <button class="btn-submit" onclick="addTask()">Dodaj zadanie ✈</button>
    </div>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('taskpilot') || '[]');
  let currentFilter = 'all';

  document.getElementById('taskDeadline').min = new Date().toISOString().split('T')[0];

  function save() { localStorage.setItem('taskpilot', JSON.stringify(tasks)); }

  function openModal() {
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('taskName').focus(), 200);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    ['taskName','taskDesc','taskDeadline'].forEach(id => document.getElementById(id).value = '');
  }

  function handleOverlayClick(e) {
    if (e.target.id === 'overlay') closeModal();
  }

  function addTask() {
    const nameEl = document.getElementById('taskName');
    const name = nameEl.value.trim();
    if (!name) {
      nameEl.style.borderColor = 'var(--accent)';
      nameEl.focus();
      setTimeout(() => nameEl.style.borderColor = '', 900);
      return;
    }
    tasks.unshift({
      id: Date.now(),
      name,
      desc: document.getElementById('taskDesc').value.trim(),
      deadline: document.getElementById('taskDeadline').value,
      done: false,
      doneAt: null
    });
    save();
    closeModal();
    render();
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.done = !t.done;
    t.doneAt = t.done ? new Date().toISOString() : null;
    save();
    render();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function purgeExpired() {
    const before = tasks.length;
    tasks = tasks.filter(t =>
      !t.done || !t.doneAt ||
      Date.now() - new Date(t.doneAt).getTime() < 172800000
    );
    if (tasks.length !== before) { save(); render(); }
  }

  function deadlineTag(dl) {
    if (!dl) return '';
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(dl + 'T00:00:00');
    const diff = Math.round((d - today) / 86400000);
    const months = ['sty','lut','mar','kwi','maj','cze','lip','sie','wrz','paź','lis','gru'];
    const str = d.getDate() + ' ' + months[d.getMonth()];
    if (diff < 0)   return `<span class="tag overdue">⚠ ${str} (${Math.abs(diff)}d po terminie)</span>`;
    if (diff === 0) return `<span class="tag soon">🔥 Dziś</span>`;
    if (diff === 1) return `<span class="tag soon">⏰ Jutro</span>`;
    return `<span class="tag">📅 ${str}</span>`;
  }

  function expiryTag(doneAt) {
    if (!doneAt) return '';
    const h = Math.max(1, Math.ceil((172800000 - (Date.now() - new Date(doneAt).getTime())) / 3600000));
    return `<span class="tag expiry">🕐 zniknie za ${h}h</span>`;
  }

  function cardHTML(t) {
    const tag     = t.done ? expiryTag(t.doneAt) : deadlineTag(t.deadline);
    const tagsRow = tag    ? `<div class="task-tags">${tag}</div>` : '';
    const descRow = t.desc ? `<div class="task-desc">${t.desc}</div>` : '';

    return `
    <div class="task-card${t.done ? ' done' : ''}" id="card-${t.id}">
      <div class="task-check${t.done ? ' checked' : ''}" onclick="toggleDone(${t.id})">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="task-name">${t.name}</div>
        ${descRow}${tagsRow}
      </div>
      <button class="btn-icon" onclick="deleteTask(${t.id})" title="Usuń">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 3.5h10M5.5 3.5V2.5h3v1M5.5 6v4M8.5 6v4M3 3.5l.7 7.5h6.6l.7-7.5"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>`;
  }

  function render() {
    const today = new Date(); today.setHours(0,0,0,0);
    let filtered;

    if (currentFilter === 'done') {
      filtered = tasks.filter(t => t.done);
    } else if (currentFilter === 'overdue') {
      filtered = tasks.filter(t => !t.done && t.deadline && new Date(t.deadline + 'T00:00:00') < today);
    } else {
      filtered = tasks.filter(t => !t.done);
    }

    document.getElementById('countDisplay').textContent = tasks.filter(t => !t.done).length;
    document.getElementById('taskList').innerHTML = filtered.map(cardHTML).join('');
    document.getElementById('emptyState').style.display = filtered.length ? 'none' : '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openModal(); }
    if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('open')
        && document.activeElement.tagName !== 'TEXTAREA') addTask();
  });

  purgeExpired();
  setInterval(purgeExpired, 30 * 60 * 1000);
</script>
</body>
</html>
